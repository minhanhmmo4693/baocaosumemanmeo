<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Hàng Kín Đáo</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.container {
  max-width:500px; margin:auto; background:white;
  padding:20px; border-radius:12px; margin-top:20px;
}
.products {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.product {
  background:#fafafa;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.product.active { border:2px solid red; }
.product img { width:100%; border-radius:8px; }
.price { color:red; font-weight:bold; }

.quantity {
  display:flex;
  justify-content:center;
  align-items:center;
}
.quantity button {
  width:30px; height:30px;
  border:none; background:red; color:white;
}
.quantity span { margin:0 10px; }

input {
  width:100%; padding:10px; margin:5px 0;
}

button.submit {
  width:100%;
  padding:15px;
  background:red;
  color:white;
  border:none;
  margin-top:10px;
}

#total { font-weight:bold; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>Giao Hàng Kín Đáo 🔒</h2>

<div class="products">

<div class="product" onclick="quickAdd('sp1', this)">
<img src="https://down-vn.img.susercontent.com/file/4cfe3aa5660605a0bdfd6ff8f3cc50e5@resize_w900_nl.webp">
<div>Siêu Mỏng</div>
<div class="price">50.000đ</div>
<div class="quantity" onclick="event.stopPropagation()">
<button onclick="changeQty('sp1', -1)">-</button>
<span id="sp1">0</span>
<button onclick="changeQty('sp1', 1)">+</button>
</div>
</div>

<div class="product" onclick="quickAdd('sp2', this)">
<img src="https://down-vn.img.susercontent.com/file/41c7d10ea0bd982f39a41073a1b6a455.webp">
<div>Kéo Dài</div>
<div class="price">60.000đ</div>
<div class="quantity" onclick="event.stopPropagation()">
<button onclick="changeQty('sp2', -1)">-</button>
<span id="sp2">0</span>
<button onclick="changeQty('sp2', 1)">+</button>
</div>
</div>

<div class="product" onclick="quickAdd('sp3', this)">
<img src="https://down-vn.img.susercontent.com/file/cf2603e051dd32c5b1ee75cc49924e11@resize_w900_nl.webp">
<div>Gân Gai</div>
<div class="price">55.000đ</div>
<div class="quantity" onclick="event.stopPropagation()">
<button onclick="changeQty('sp3', -1)">-</button>
<span id="sp3">0</span>
<button onclick="changeQty('sp3', 1)">+</button>
</div>
</div>

<div class="product" onclick="quickAdd('sp4', this)">
<img src="https://down-vn.img.susercontent.com/file/sg-11134201-22120-i00fvxbdemlv21@resize_w900_nl.webp">
<div>Kingtex</div>
<div class="price">70.000đ</div>
<div class="quantity" onclick="event.stopPropagation()">
<button onclick="changeQty('sp4', -1)">-</button>
<span id="sp4">0</span>
<button onclick="changeQty('sp4', 1)">+</button>
</div>
</div>

</div>

<div id="total">Tổng: 0đ</div>

<input id="name" placeholder="Tên">
<input id="phone" placeholder="SĐT">

<button class="submit" onclick="sendData()">Đặt hàng</button>

</div>

<script>
const prices = {
  sp1: 50000,
  sp2: 60000,
  sp3: 55000,
  sp4: 70000
};

function getQty(id){
  return parseInt(document.getElementById(id).innerText) || 0;
}

function updateTotal(){
  let total =
    getQty("sp1")*prices.sp1 +
    getQty("sp2")*prices.sp2 +
    getQty("sp3")*prices.sp3 +
    getQty("sp4")*prices.sp4;

  document.getElementById("total").innerText =
    "Tổng: " + total.toLocaleString() + "đ";
}

function quickAdd(id, el){
  let span = document.getElementById(id);
  span.innerText = getQty(id) + 1;
  el.classList.add("active");
  updateTotal();
}

function changeQty(id, val){
  let span = document.getElementById(id);
  let newVal = Math.max(0, getQty(id) + val);
  span.innerText = newVal;
  updateTotal();
}

function sendData(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let total =
    getQty("sp1")*prices.sp1 +
    getQty("sp2")*prices.sp2 +
    getQty("sp3")*prices.sp3 +
    getQty("sp4")*prices.sp4;

  let data = {
    name: name,
    phone: phone,
    sp1: getQty("sp1"),
    sp2: getQty("sp2"),
    sp3: getQty("sp3"),
    sp4: getQty("sp4"),
    total: total
  };

  console.log(data); // DEBUG

  fetch("https://script.google.com/macros/s/AKfycbykhIWxjSr-U7r92B39Dm_Sgp1fpfsW741kL0sM-N0uFv2ps7vgdAcgG3Mk8ySG_lc/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  let params = new URLSearchParams({
    name: name,
    phone: phone,
    total: total
  });

  window.location.href = "pay.html?" + params.toString();
}
</script>

</body>
</html>

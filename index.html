<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Hàng Kín Đáo</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  text-align: center;
}
.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h1 { color: #e91e63; }

.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 15px 0;
}

.product {
  background: #fafafa;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
.product.active {
  border: 2px solid #e91e63;
}
.product img {
  width: 100%;
  border-radius: 8px;
}
.product-name {
  font-weight: bold;
  margin-top: 5px;
}
.price {
  color: #e91e63;
  font-weight: bold;
}

.quantity {
  display: flex;
  justify-content: center;
  align-items: center;
}
.quantity button {
  width: 30px;
  height: 30px;
  border: none;
  background: #e91e63;
  color: white;
  font-size: 18px;
  border-radius: 5px;
}
.quantity span {
  margin: 0 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.btn {
  background: #e91e63;
  color: white;
  padding: 15px;
  border: none;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
}

#total {
  font-weight: bold;
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Giao Hàng Kín Đáo 🔒</h1>
  <p>Chọn sản phẩm bạn cần</p>

  <div class="products">

    <div class="product" onclick="quickAdd('sp1', this)">
      <img src="https://down-vn.img.susercontent.com/file/4cfe3aa5660605a0bdfd6ff8f3cc50e5@resize_w900_nl.webp">
      <div class="product-name">Siêu Mỏng</div>
      <div class="price">50.000đ</div>
      <div class="quantity" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); changeQty('sp1', -1, this)">-</button>
        <span id="sp1">0</span>
        <button onclick="event.stopPropagation(); changeQty('sp1', 1, this)">+</button>
      </div>
    </div>

    <div class="product" onclick="quickAdd('sp2', this)">
      <img src="https://down-vn.img.susercontent.com/file/41c7d10ea0bd982f39a41073a1b6a455.webp">
      <div class="product-name">Kéo Dài</div>
      <div class="price">60.000đ</div>
      <div class="quantity" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); changeQty('sp2', -1, this)">-</button>
        <span id="sp2">0</span>
        <button onclick="event.stopPropagation(); changeQty('sp2', 1, this)">+</button>
      </div>
    </div>

    <div class="product" onclick="quickAdd('sp3', this)">
      <img src="https://down-vn.img.susercontent.com/file/cf2603e051dd32c5b1ee75cc49924e11@resize_w900_nl.webp">
      <div class="product-name">Gân Gai</div>
      <div class="price">55.000đ</div>
      <div class="quantity" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); changeQty('sp3', -1, this)">-</button>
        <span id="sp3">0</span>
        <button onclick="event.stopPropagation(); changeQty('sp3', 1, this)">+</button>
      </div>
    </div>

    <div class="product" onclick="quickAdd('sp4', this)">
      <img src="https://down-vn.img.susercontent.com/file/sg-11134201-22120-i00fvxbdemlv21@resize_w900_nl.webp">
      <div class="product-name">Kingtex</div>
      <div class="price">70.000đ</div>
      <div class="quantity" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); changeQty('sp4', -1, this)">-</button>
        <span id="sp4">0</span>
        <button onclick="event.stopPropagation(); changeQty('sp4', 1, this)">+</button>
      </div>
    </div>

  </div>

  <div id="total">Tổng: 0đ</div>

  <form onsubmit="sendData(event)">
    <input type="text" id="name" placeholder="Tên của bạn" required>
    <input type="tel" id="phone" placeholder="SĐT" required>
    <button class="btn">Đặt hàng ngay</button>
  </form>

</div>

<script>
const prices = {
  sp1: 50000,
  sp2: 60000,
  sp3: 55000,
  sp4: 70000
};

function updateTotal() {
  let total =
    sp1.innerText * prices.sp1 +
    sp2.innerText * prices.sp2 +
    sp3.innerText * prices.sp3 +
    sp4.innerText * prices.sp4;

  document.getElementById("total").innerText =
    "Tổng: " + total.toLocaleString() + "đ";
}

function quickAdd(id, el) {
  let span = document.getElementById(id);
  span.innerText = parseInt(span.innerText) + 1;
  el.classList.add("active");
  updateTotal();
}

function changeQty(id, value, btn) {
  let span = document.getElementById(id);
  let newVal = Math.max(0, parseInt(span.innerText) + value);
  span.innerText = newVal;

  if (newVal > 0) {
    btn.closest('.product').classList.add("active");
  }

  updateTotal();
}

function sendData(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let total =
    sp1.innerText * prices.sp1 +
    sp2.innerText * prices.sp2 +
    sp3.innerText * prices.sp3 +
    sp4.innerText * prices.sp4;

  let data = {
    name: name,
    phone: phone,
    sp1: sp1.innerText,
    sp2: sp2.innerText,
    sp3: sp3.innerText,
    sp4: sp4.innerText,
    total: total
  };

  // Gửi Google Sheet
  fetch("https://script.google.com/macros/s/AKfycbykhIWxjSr-U7r92B39Dm_Sgp1fpfsW741kL0sM-N0uFv2ps7vgdAcgG3Mk8ySG_lc/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  // Chuyển sang trang QR
  let params = new URLSearchParams({
    name: name,
    phone: phone,
    total: total
  });

  window.location.href = "pay.html?" + params.toString();
}
</script>

</body>
</html>
